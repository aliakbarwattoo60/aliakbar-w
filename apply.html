<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply Now | NU Consultants</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-content">
    <section class="highlights-section">
      <h1 class="highlights-section__title">Application Form</h1>
      <form class="consult-card" action="#" method="post" style="max-width:520px;margin:0 auto;">
        <input class="consult-card__input" type="text" name="name" placeholder="Your Name" required>
        <input class="consult-card__input" type="email" name="email" placeholder="Email Address" required>
        <input class="consult-card__input" type="tel" name="phone" placeholder="Phone Number" required>
        <textarea class="consult-card__input consult-card__input--textarea" name="message" placeholder="Which destination are you interested in?"></textarea>
        <button class="consult-card__button" type="submit">Submit Application</button>
      </form>
    </section>
  </main>
</body>
</html>
